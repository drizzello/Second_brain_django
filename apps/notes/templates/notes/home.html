<h1>TO-DO List</h1>
{% if messages %}
<ul class="messages">
    {% for message in messages %}
    <li>{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
    {% endfor %}
</ul>
{% endif %}
<ul>
    <li>
        <a href="{% url 'notes:list' %}">Vedi lista</a>
    </li>
    <li>
        <a href="{% url 'notes:add_note' %}">Aggiungi una nota</a>
    </li>
</ul>
