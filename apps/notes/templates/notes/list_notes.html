<html>
<head>
<style>
table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

td, th {
  border: 1px solid #dddddd;
  text-align: left;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #dddddd;
}
</style>
</head>
<body>


<h1>Ecco la lista di note:</h1>
<table>
    <tr>
        <th>Note Id</th>
        <th>Note Title</th>
        <th>Note Tag</th>
        <th>Update Note</th>
        <th>Remove</th>
    </tr>
    {% for note in notes %}
        <tr>
            <td><a href="{% url 'notes:note_detail' note.id %}">{{note.id}}</a></td>
            <td>{{note.title}}</td>
            <td>
              {{note.tag}}
            </td>
            <td><a href="{% url 'notes:update_note' note.id %}">Update</a></td>
            <td>
                <form action="{% url 'notes:delete_note' note.id %}" method="post">
                 {% csrf_token %}
                <input type="submit" value="Elimina">
              </form>
            </td>
        </tr>
    {% endfor %}
</table>
<a href="{% url 'notes:home' %}">Torna Indietro</a>
</body>
</html>
